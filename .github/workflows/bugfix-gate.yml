# ABOUTME: Enforces bugfix evidence completeness and required verification checks on pull requests.
# ABOUTME: Fails PRs when mandatory sections or bugfix safeguards are missing.
name: bugfix-gate

on:
  pull_request:
    types: [opened, edited, synchronize, reopened, labeled, unlabeled, ready_for_review]

permissions:
  contents: read
  pull-requests: read

jobs:
  bugfix-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Validate PR evidence and bugfix safeguards
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request
            const body = pr?.body ?? ''
            const labels = (pr?.labels ?? []).map((label) => String(label.name || '').toLowerCase())

            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              per_page: 100,
            })
            const changedPaths = files.map((file) => file.filename)

            const requiredSections = [
              'Root cause (one sentence)',
              'Reproduction steps',
              'Failing test (name + output snippet)',
              'Passing test output snippet',
              'Files changed',
              'What was removed/neutralized',
              'Acceptance checklist (PASS/FAIL)',
              'Verification command outputs',
            ]

            function escapeRegExp(value) {
              return value.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')
            }

            function sectionContent(markdown, title) {
              const heading = `##\\s*${escapeRegExp(title)}\\s*`
              const pattern = new RegExp(`${heading}\\n([\\s\\S]*?)(?=\\n##\\s|$)`, 'i')
              const match = markdown.match(pattern)
              return match ? match[1].trim() : ''
            }

            function isMeaningful(content) {
              if (!content) return false
              const normalized = content
                .replace(/<!--[\s\S]*?-->/g, '')
                .replace(/\[required\]/gi, '')
                .replace(/\s+/g, ' ')
                .trim()
                .toLowerCase()
              if (!normalized) return false
              const placeholders = ['tbd', 'todo', 'n/a', 'na', 'none', 'pending', '[fill']
              return !placeholders.some((token) => normalized.startsWith(token))
            }

            const missingSections = requiredSections.filter((section) => {
              const content = sectionContent(body, section)
              return !isMeaningful(content)
            })

            const uiPathPattern = /^(src\/screens\/|src\/.*\.(css|scss|sass|less)$|src\/.*\.(tsx|jsx)$|index\.html|public\/)/i
            const uiChanged = changedPaths.some((path) => uiPathPattern.test(path))
            const screenshotSection = sectionContent(body, 'Screenshot paths (before/after for UI bugs)')
            const hasScreenshotPath = /(?:^|\s)(\/|\.\/|https?:\/\/)\S+\.(png|jpe?g|webp|gif)(?:\s|$)/i.test(screenshotSection)

            const bugfixLabeled = labels.includes('bugfix')
            const codePathPattern = /^src\/.*\.(ts|tsx|js|jsx|css|scss|sass|less)$/i
            const testPathPattern = /^src\/.*\.(test|spec)\.(ts|tsx|js|jsx)$/i
            const codeChanged = changedPaths.some((path) => codePathPattern.test(path))
            const testsChanged = changedPaths.some((path) => testPathPattern.test(path))

            const errors = []

            if (missingSections.length > 0) {
              errors.push(`Missing required PR template sections: ${missingSections.join(', ')}`)
            }

            if (uiChanged && !hasScreenshotPath) {
              errors.push('UI-related files changed but screenshot paths section has no image path.')
            }

            if (bugfixLabeled && codeChanged && !testsChanged) {
              errors.push('Bugfix-labeled PR changes code but does not update/add test files.')
            }

            if (errors.length > 0) {
              core.setFailed(errors.join('\n'))
            } else {
              core.info('Bugfix evidence gate passed.')
            }

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm test

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run typecheck
